<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Your Password — WTP TimeTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .invite-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .invite-logo { display: flex; align-items: center; gap: .625rem; margin-bottom: 1.5rem; }
    .invite-logo img { height: 32px; }
    .invite-title { font-size: 1.25rem; font-weight: 800; color: var(--text); margin-bottom: .25rem; letter-spacing: -.025em; }
    .invite-sub { font-size: .875rem; color: var(--muted); margin-bottom: 1.5rem; }
    .invite-field { margin-bottom: 1rem; }
    .invite-field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .375rem; }
    .invite-error { color: var(--red-base); font-size: .8125rem; font-weight: 500; margin-bottom: 1rem; padding: .5rem .75rem; background: var(--red-light); border-radius: var(--radius-sm); border-left: 3px solid var(--red-base); display: none; }
    .invite-success { color: #065f46; font-size: .875rem; font-weight: 500; margin-top: 1rem; padding: .625rem .875rem; background: #d1fae5; border-radius: var(--radius-sm); border-left: 3px solid #059669; display: none; }
    .spinner-wrap { text-align: center; padding: 2rem 0; color: var(--muted); font-size: .875rem; }
    .invalid-link { text-align: center; padding: 1rem 0; }
    .invalid-link p { color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>

<div class="invite-card">
  <div class="invite-logo">
    <img src="assets/logo-colored.webp" alt="Willow Tree Properties"
      onerror="this.style.display='none'">
    <span style="font-weight:700; color:var(--text); font-size:.9375rem;">Willow Tree Properties</span>
  </div>

  <!-- Loading state -->
  <div id="state-loading" class="spinner-wrap">Verifying invite link…</div>

  <!-- Invalid / expired link -->
  <div id="state-invalid" style="display:none;">
    <div class="invite-title" style="color:var(--red-base);">Invalid or expired link</div>
    <p style="color:var(--muted); font-size:.875rem; margin-top:.5rem;">This invite link has already been used or has expired. Ask your manager to resend an invite.</p>
  </div>

  <!-- Set-password form -->
  <form id="set-password-form" style="display:none;" novalidate>
    <div class="invite-title">Welcome to WTP TimeTrack</div>
    <div class="invite-sub" id="invite-sub">Set a password to activate your account.</div>

    <div class="invite-field">
      <label for="new-password">Password</label>
      <input type="password" id="new-password" class="wtp-input" placeholder="Min 8 characters" minlength="8" required autocomplete="new-password">
    </div>
    <div class="invite-field">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" class="wtp-input" placeholder="Repeat password" required autocomplete="new-password">
    </div>

    <p id="invite-error" class="invite-error"></p>

    <button type="submit" class="btn-save" style="width:100%;" id="set-pw-btn">Activate Account</button>
  </form>

  <!-- Success state -->
  <div id="state-success" style="display:none;">
    <div class="invite-title">Password set!</div>
    <p style="color:var(--muted); font-size:.875rem; margin-top:.5rem;">Redirecting you to your dashboard…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
(async function () {
  'use strict';

  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function show(id) {
    ['state-loading', 'state-invalid', 'set-password-form', 'state-success'].forEach(s => {
      document.getElementById(s).style.display = s === id ? '' : 'none';
    });
  }

  // Detect invite tokens in the URL hash BEFORE anything else runs.
  // Supabase appends: #access_token=...&type=invite&...
  const hashParams = new URLSearchParams(window.location.hash.slice(1));
  const isInviteFlow = hashParams.get('type') === 'invite' && hashParams.has('access_token');

  // If this is an invite link, sign out any stale session (e.g. manager testing
  // in the same browser) so the invite tokens take over cleanly.
  if (isInviteFlow) {
    await _sb.auth.signOut({ scope: 'local' });
  }

  _sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      clearTimeout(timeout);
      const name = session.user.user_metadata?.full_name;
      if (name) {
        document.getElementById('invite-sub').textContent =
          `Hi ${name}! Set a password to activate your account.`;
      }
      show('set-password-form');
      document.getElementById('new-password').focus();
      return;
    }

    // INITIAL_SESSION: only redirect if there are no invite tokens in the URL.
    // If there ARE invite tokens, stay put and wait for the SIGNED_IN event.
    if (event === 'INITIAL_SESSION' && session && !isInviteFlow) {
      clearTimeout(timeout);
      redirectToDashboard(session);
      return;
    }

    if (event === 'INITIAL_SESSION' && !session && !isInviteFlow) {
      clearTimeout(timeout);
      show('state-invalid');
    }
  });

  // Fallback: if SIGNED_IN hasn't fired after 6 s the link is expired/invalid.
  const timeout = setTimeout(() => {
    _sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) show('state-invalid');
    });
  }, 6000);

  document.getElementById('set-password-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const errEl   = document.getElementById('invite-error');
    const btn     = document.getElementById('set-pw-btn');
    const pw      = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    errEl.style.display = 'none';

    if (pw.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.style.display = 'block'; return;
    }
    if (pw !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Activating…';

    try {
      const { error } = await _sb.auth.updateUser({ password: pw });
      if (error) throw error;

      // Mark employee as active now that they've set their password
      const { data: { user } } = await _sb.auth.getUser();
      if (user) {
        await _sb.from('employees').update({ invite_status: 'active' }).eq('id', user.id);
      }

      clearTimeout(timeout);
      show('state-success');

      // Redirect to the right dashboard after a short pause
      setTimeout(async () => {
        const { data: { session } } = await _sb.auth.getSession();
        redirectToDashboard(session);
      }, 1200);
    } catch (err) {
      errEl.textContent = err.message || 'Failed to set password. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Activate Account';
    }
  });

  function redirectToDashboard(session) {
    if (!session) { window.location.href = 'index.html'; return; }
    // Role is stored in profiles — quick fetch to determine destination
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    sb.from('profiles').select('role').eq('id', session.user.id).single().then(({ data }) => {
      window.location.href = data?.role === 'manager' ? 'manager.html' : 'employee.html';
    });
  }
})();
</script>
</body>
</html>
